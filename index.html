<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>전자칠판 대결 퀴즈 v6.5 (관리패널)</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p1: #ff5e5e; --p2: #5eafff; --p3: #5eff8b; --p4: #ffde5e; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Malgun Gothic', sans-serif; background-color: #1a1a1a; color: white; user-select: none; }
        body {
            background:
                radial-gradient(circle at 20% 20%, rgba(94, 175, 255, 0.18), transparent 35%),
                radial-gradient(circle at 80% 80%, rgba(255, 94, 94, 0.18), transparent 35%),
                radial-gradient(circle at 50% 50%, rgba(94, 255, 139, 0.08), transparent 45%),
                #111;
        }
        #setup-screen { position: absolute; inset: 0; background: linear-gradient(135deg, #2c3e50, #000); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .config-card {
            background: linear-gradient(145deg, rgba(52,73,94,0.95), rgba(23,32,42,0.95));
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #6ea7ff;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 30px rgba(110, 167, 255, 0.25);
        }
        #game-wrapper { display: none; width: 100vw; height: 100vh; flex-direction: column; }
        #question-area {
            height: 48vh;
            width: 100%;
            position: relative;
            background: linear-gradient(160deg, #1e1e1e, #2c2c2c 35%, #181818);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-bottom: 5px solid #444;
            box-sizing: border-box;
            overflow: hidden;
        }
        #question-area::before {
            content: "";
            position: absolute;
            inset: -20%;
            background: conic-gradient(from 0deg, rgba(94,175,255,0.12), rgba(255,94,94,0.12), rgba(94,255,139,0.12), rgba(255,222,94,0.12), rgba(94,175,255,0.12));
            animation: spinGlow 16s linear infinite;
            filter: blur(30px);
            pointer-events: none;
        }
        #q-text {
            font-size: 2.4rem;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            padding: 0 50px;
            line-height: 1.4;
            text-shadow: 0 3px 15px rgba(0, 0, 0, 0.85), 0 0 10px rgba(255, 255, 255, 0.15);
            z-index: 1;
        }
        #q-image-box { height: 22vh; width: 80%; display: flex; justify-content: center; align-items: center; }
        #q-image {
            max-height: 100%;
            max-width: 100%;
            border-radius: 15px;
            display: none;
            border: 8px solid #fff;
            box-shadow: 0 0 35px rgba(255,255,255,0.35);
            z-index: 1;
        }
        #player-area { height: 52vh; width: 100%; display: flex; }
        .player-zone {
            flex: 1;
            height: 100%;
            border-right: 2px solid #444;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: 0.25s ease;
            background: linear-gradient(180deg, #242424, #171717);
        }
        .player-zone:hover {
            transform: translateY(-3px);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.2), 0 10px 25px rgba(0,0,0,0.35);
        }
        .player-header {
            height: 50px;
            font-size: 2.5rem;
            text-align: center;
            padding: 5px;
            background: rgba(255,255,255,0.08);
            text-shadow: 0 0 12px rgba(255,255,255,0.35);
        }
        .choices-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; min-height: 0; }
        .choices-grid.spelling-mode {
            display: flex !important;
            flex-direction: column;
            gap: 8px;
            padding-top: 10px;
            overflow: hidden;
        }
        .spell-slots {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 4px 6px 0;
        }
        .spell-slot {
            width: 52px;
            height: 58px;
            border: 2px solid #666;
            border-radius: 12px;
            background: rgba(0,0,0,0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.85rem;
            font-weight: 800;
            letter-spacing: 0.02em;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.75);
            transition: box-shadow 0.12s ease, border-color 0.12s ease, background 0.12s ease;
            user-select: none;
        }
        .spell-slot.filled { color: rgba(255,255,255,0.95); border-color: rgba(243,156,18,0.95); box-shadow: 0 0 16px rgba(243,156,18,0.35); background: rgba(243,156,18,0.12); }
        .spell-slot.caret { outline: 3px solid rgba(110,167,255,0.6); outline-offset: 1px; }
        .spell-slot.correct { border-color: rgba(46,204,113,0.95); background: rgba(46,204,113,0.14); box-shadow: 0 0 16px rgba(46,204,113,0.45); color: rgba(255,255,255,0.98); }
        .spell-slot.wrong { border-color: rgba(255,94,94,0.95); background: rgba(255,94,94,0.14); box-shadow: 0 0 16px rgba(255,94,94,0.45); color: rgba(255,255,255,0.98); }

        .spell-keyboard {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            padding: 4px 6px 6px;
        }
        .spell-key {
            height: 40px;
            border-radius: 12px;
            border: 2px solid #666;
            background: linear-gradient(160deg, #3b3b3b, #2a2a2a);
            color: #fff;
            font-size: 1.15rem;
            font-weight: 800;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease;
            user-select: none;
        }
        .spell-key:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 12px rgba(255,255,255,0.12); filter: brightness(1.05); }
        .spell-key:active { transform: translateY(0px) scale(0.98); }
        .spell-key.backspace { font-size: 1rem; }
        .choice-btn {
            background: linear-gradient(160deg, #3b3b3b, #2a2a2a);
            color: white;
            border: 2px solid #666;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
        }
        .choice-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.35), 0 0 10px rgba(255,255,255,0.15); }
        .choice-btn.selected { background: linear-gradient(160deg, #f39c12, #e67e22) !important; border-color: white; box-shadow: 0 0 14px rgba(243,156,18,0.7); }
        .submit-btn {
            height: 60px;
            margin: 0 10px 10px;
            background: linear-gradient(160deg, #3498db, #1f7eb8);
            color: white;
            border: none;
            font-size: 1.3rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            display: none;
            box-shadow: 0 8px 16px rgba(0,0,0,0.35);
            transition: transform 0.12s ease, filter 0.12s ease;
        }
        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
        .submit-btn:disabled { opacity: 0.45; filter: grayscale(0.5); cursor: not-allowed; transform: none; }
        #overlay-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 5rem;
            font-weight: bold;
            color: #f1c40f;
            text-shadow: 0 0 30px black;
            z-index: 100;
            pointer-events: none;
            text-align: center;
            width: 90%;
            animation: pulseText 1.1s ease-in-out infinite alternate;
        }
        .eliminated { filter: grayscale(1); opacity: 0.2 !important; pointer-events: none; }
        .correct-ans { background: #2ecc71 !important; border-color: #fff !important; transform: scale(1.05); }
        #game-wrapper.round-transition { animation: roundTransition 0.45s ease; }
        @keyframes spinGlow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulseText { from { transform: translate(-50%, -50%) scale(1); } to { transform: translate(-50%, -50%) scale(1.03); } }
        @keyframes roundTransition {
            0% { opacity: 0.2; transform: scale(1.02); filter: blur(3px); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
        }
    </style>
</head>
<body>

    <audio id="bgm-audio" loop>
        <source src="bgm.mp3" type="audio/mpeg">
    </audio>
    <audio id="victory-audio">
        <source src="victory.mp3" type="audio/mpeg">
    </audio>

    <div id="setup-screen">
        <div class="config-card">
            <h1>🎒 퀴즈 마스터 v6.4</h1>
            <p>1. 엑셀 파일 업로드</p>
            <input type="file" id="excel-input" accept=".xlsx, .xls"><br><br>
            <p>2. 대결 인원 설정</p>
            <select id="p-count-select" style="padding:10px; font-size:1rem; width: 200px;">
                <option value="2">2명 대결 (1:1)</option>
                <option value="3">3명 대결 (1:1:1)</option>
                <option value="4">4명 대결 (1:1:1:1)</option>
            </select><br><br>
            <button id="start-btn" disabled style="padding:15px 40px; font-size:1.2rem; cursor:pointer; background:#27ae60; color:white; border:none; border-radius:10px;">게임 시작</button>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="question-area">
            <div id="q-text"></div>
            <div id="q-image-box"><img id="q-image" src=""></div>
            <div id="overlay-msg"></div>
        </div>
        <div id="player-area"></div>
    </div>

    <script>
        let quizData = [];
        let currentIdx = 0;
        let pCount = 2;
        let isLocked = false;
        let adminWin = null;
        let playerSelections = {}; 
        let spellingInputs = {}; // 스펠링 타입에서 플레이어가 입력한 글자 배열
        let spellingCorrect = {}; // 스펠링 타입 정답 문자열
        const characters = ['🐶','🐱','🦊','🦁'];

        const bgm = document.getElementById('bgm-audio');
        const victorySfx = document.getElementById('victory-audio');

        // --- 오디오 시스템 (SFX) ---
        let audioCtx;
        function playTone(freq, start, duration, type='sine', volume=0.1) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + start);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime + start);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + start + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + start);
            osc.stop(audioCtx.currentTime + start + duration);
        }

        function playDingDong() { playTone(523, 0, 0.4); playTone(659, 0.1, 0.4); playTone(783, 0.2, 0.6); }
        function playLogout() { playTone(440, 0, 0.2, 'square', 0.05); playTone(330, 0.1, 0.2, 'square', 0.05); playTone(220, 0.2, 0.4, 'square', 0.05); }
        function playVictoryWithFadeout() {
            victorySfx.pause();
            victorySfx.currentTime = 0;
            victorySfx.volume = 1.0;
            victorySfx.play().catch(e => console.log("Victory 파일이 없거나 로드 실패"));

            const fadeDelayMs = 3500;   // 앞부분은 원래 볼륨 유지
            const fadeDurationMs = 2500; // 부드럽게 줄어들기
            const stepMs = 100;
            const steps = Math.floor(fadeDurationMs / stepMs);
            const volumeStep = 1 / Math.max(steps, 1);

            setTimeout(() => {
                let currentVol = 1.0;
                const fadeTimer = setInterval(() => {
                    currentVol = Math.max(0, currentVol - volumeStep);
                    victorySfx.volume = currentVol;
                    if(currentVol <= 0.001) {
                        clearInterval(fadeTimer);
                        victorySfx.pause();
                        victorySfx.currentTime = 0;
                        victorySfx.volume = 1.0; // 다음 재생 대비 초기화
                    }
                }, stepMs);
            }, fadeDelayMs);
        }

        // --- 파일 및 데이터 ---
        document.getElementById('excel-input').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const data = new Uint8Array(e.target.result);
                const wb = XLSX.read(data, {type: 'array'});
                quizData = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                if(quizData.length > 0) document.getElementById('start-btn').disabled = false;
            };
            reader.readAsArrayBuffer(e.target.files[0]);
        };

        document.getElementById('start-btn').onclick = () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            bgm.volume = 0.5; // 배경음악 50% 볼륨
            bgm.play().catch(e => console.log("BGM 파일이 없거나 로드 실패"));
            
            pCount = parseInt(document.getElementById('p-count-select').value);
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-wrapper').style.display = 'flex';
            initGameZones();
            openController();
        };

        function initGameZones() {
            const area = document.getElementById('player-area');
            area.innerHTML = '';
            for(let i=1; i<=pCount; i++) {
                area.innerHTML += `
                    <div class="player-zone" id="zone-${i}">
                        <div class="player-header">${characters[i-1]}</div>
                        <div class="choices-grid" id="choices-${i}"></div>
                        <button class="submit-btn" id="submit-${i}" onclick="submitAnswer(${i})">제출하기</button>
                    </div>`;
            }
            loadQuestion();
        }

        function loadQuestion() {
            if(currentIdx >= quizData.length) return;
            isLocked = false;
            document.getElementById('overlay-msg').innerText = "";
            const gameWrapper = document.getElementById('game-wrapper');
            gameWrapper.classList.remove('round-transition');
            void gameWrapper.offsetWidth; // reflow to restart animation each round
            gameWrapper.classList.add('round-transition');
            const q = quizData[currentIdx];
            document.getElementById('q-text').innerText = q.question;
            const img = document.getElementById('q-image');
            img.style.display = 'none'; img.src = q.image || "";
            playerSelections = {};
            for(let i=1; i<=pCount; i++) {
                playerSelections[i] = [];
                const grid = document.getElementById(`choices-${i}`);
                grid.innerHTML = '';
                document.getElementById(`zone-${i}`).classList.remove('eliminated');
                document.getElementById(`submit-${i}`).disabled = false;
                document.getElementById(`submit-${i}`).style.display = (q.type === '복수정답' || q.type === '순서' || q.type === '스펠링') ? 'block' : 'none';

                grid.classList.remove('spelling-mode');
                if(q.type === '스펠링') {
                    initSpellingForPlayer(i, q);
                } else {
                    [1,2,3,4].forEach(n => {
                        const txt = q[`choice${n}`];
                        if(txt) {
                            const btn = document.createElement('button');
                            btn.className = 'choice-btn';
                            btn.innerText = txt;
                            btn.dataset.baseText = txt;
                            btn.dataset.choiceNum = n;
                            btn.onclick = () => handleChoice(i, n, btn);
                            grid.appendChild(btn);
                        }
                    });
                }
            }
            if(adminWin) updateControllerUI();
        }

        function setAllSubmitDisabled(disabled) {
            for(let i=1; i<=pCount; i++) {
                const btn = document.getElementById(`submit-${i}`);
                if(btn) btn.disabled = disabled;
            }
        }

        function updateOrderChoiceLabels(pNum) {
            const btns = document.querySelectorAll(`#choices-${pNum} .choice-btn`);
            btns.forEach(btn => {
                const cNum = parseInt(btn.dataset.choiceNum);
                const orderIdx = playerSelections[pNum].indexOf(cNum);
                btn.innerText = (orderIdx > -1) ? `${orderIdx + 1}. ${btn.dataset.baseText}` : btn.dataset.baseText;
            });
        }

        // --- 스펠링 타입 (가상 터치 키보드) ---
        function initSpellingForPlayer(pNum, q) {
            const grid = document.getElementById(`choices-${pNum}`);
            // 엑셀에 불필요한 공백이 섞여도 입력 불가능한 슬롯이 생기지 않도록 제거
            const correctWord = String(q.answer ?? '').replace(/\s+/g, '').trim();
            spellingCorrect[pNum] = correctWord;
            spellingInputs[pNum] = new Array(correctWord.length).fill('');

            grid.classList.add('spelling-mode');
            grid.innerHTML = `
                <div class="spell-slots" id="spell-slots-${pNum}"></div>
                <div class="spell-keyboard" id="spell-kb-${pNum}"></div>
            `;

            renderSpellSlots(pNum);
            renderSpellKeyboard(pNum);
        }

        function renderSpellKeyboard(pNum) {
            const kbEl = document.getElementById(`spell-kb-${pNum}`);
            if(!kbEl) return;
            kbEl.innerHTML = '';

            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            letters.forEach(L => {
                const b = document.createElement('button');
                b.className = 'spell-key';
                b.innerText = L;
                b.onclick = () => handleSpellKey(pNum, L);
                kbEl.appendChild(b);
            });

            const back = document.createElement('button');
            back.className = 'spell-key backspace';
            back.innerText = '⌫';
            back.onclick = () => handleSpellBackspace(pNum);
            kbEl.appendChild(back);
        }

        function renderSpellSlots(pNum) {
            const slotsEl = document.getElementById(`spell-slots-${pNum}`);
            if(!slotsEl) return;
            const inputs = spellingInputs[pNum] || [];
            const correctWord = spellingCorrect[pNum] || '';

            // 슬롯이 이미 만들어져 있지 않으면(첫 진입) 생성
            if(slotsEl.children.length !== inputs.length) {
                slotsEl.innerHTML = '';
                for(let idx = 0; idx < inputs.length; idx++) {
                    const slot = document.createElement('div');
                    slot.className = 'spell-slot';
                    slot.dataset.slotIndex = idx;
                    slot.innerText = '_';
                    slotsEl.appendChild(slot);
                }
            }

            const firstEmpty = inputs.findIndex(v => v === '');
            const caretIdx = (firstEmpty === -1) ? (inputs.length > 0 ? inputs.length - 1 : -1) : firstEmpty;

            const slotNodes = slotsEl.querySelectorAll('.spell-slot');
            slotNodes.forEach(slot => {
                const idx = parseInt(slot.dataset.slotIndex);
                const val = inputs[idx];
                slot.classList.toggle('filled', !!val);
                slot.classList.toggle('caret', idx === caretIdx);

                // 스펠링 편집 중에는 입력값/언더바만 표시
                slot.classList.remove('correct');
                slot.classList.remove('wrong');
                slot.innerText = val ? val : '_';
            });

            // correctWord가 있어도 편집 중에는 `_`/입력값만 보여줌
        }

        function handleSpellKey(pNum, letter) {
            if(isLocked) return;
            const inputs = spellingInputs[pNum];
            if(!inputs) return;

            const idx = inputs.findIndex(v => v === '');
            if(idx === -1) return; // 더 이상 입력 불가
            inputs[idx] = letter;
            renderSpellSlots(pNum);
        }

        function handleSpellBackspace(pNum) {
            if(isLocked) return;
            const inputs = spellingInputs[pNum];
            if(!inputs) return;

            for(let idx = inputs.length - 1; idx >= 0; idx--) {
                if(inputs[idx]) {
                    inputs[idx] = '';
                    renderSpellSlots(pNum);
                    return;
                }
            }
        }

        function revealSpellResult(pNum, isCorrect) {
            const slotsEl = document.getElementById(`spell-slots-${pNum}`);
            if(!slotsEl) return;
            const inputs = spellingInputs[pNum] || [];
            const correctWord = spellingCorrect[pNum] || '';
            const slotNodes = slotsEl.querySelectorAll('.spell-slot');

            slotNodes.forEach(slot => {
                const idx = parseInt(slot.dataset.slotIndex);
                const correctChar = correctWord[idx] || '';
                const typedChar = inputs[idx] || '';

                slot.classList.remove('caret');
                slot.classList.remove('filled');
                slot.classList.remove('correct');
                slot.classList.remove('wrong');

                if(isCorrect) {
                    slot.classList.add('correct');
                    slot.innerText = correctChar || '_';
                } else {
                    // 입력이 맞는 자리만 초록, 틀린 자리는 빨강
                    const isPosCorrect = typedChar && typedChar.toUpperCase() === correctChar.toUpperCase();
                    slot.classList.add(isPosCorrect ? 'correct' : 'wrong');
                    // 제출 시에는 정답을 드러내기 위해 정답 글자를 채움
                    slot.innerText = correctChar || '_';
                }
            });
        }

        function handleChoice(pNum, sNum, btnElement) {
            if(isLocked) return;
            const qType = quizData[currentIdx].type;
            if(qType === '복수정답') {
                const idx = playerSelections[pNum].indexOf(sNum);
                if(idx > -1) { playerSelections[pNum].splice(idx, 1); btnElement.classList.remove('selected'); }
                else { playerSelections[pNum].push(sNum); btnElement.classList.add('selected'); }
            } else if(qType === '순서') {
                const idx = playerSelections[pNum].indexOf(sNum);
                if(idx > -1) {
                    playerSelections[pNum].splice(idx, 1);
                    btnElement.classList.remove('selected');
                } else {
                    playerSelections[pNum].push(sNum);
                    btnElement.classList.add('selected');
                }
                updateOrderChoiceLabels(pNum);
            } else { checkSingleAnswer(pNum, sNum); }
        }

        function checkSingleAnswer(pNum, sNum) {
            if(sNum == quizData[currentIdx].answer) winRound(pNum, [sNum]);
            else { eliminatePlayer(pNum); }
        }

        function submitAnswer(pNum) {
            if(isLocked) return;
            const btn = document.getElementById(`submit-${pNum}`);
            if(btn && btn.disabled) return;
            const q = quizData[currentIdx];
            if(q.type === '스펠링') {
                const inputs = spellingInputs[pNum] || [];
                const correctWord = spellingCorrect[pNum] !== undefined ? spellingCorrect[pNum] : String(q.answer ?? '').trim();
                const userWord = inputs.join('');

                const norm = (s) => String(s).replace(/\s+/g, '').toLowerCase();
                if(norm(userWord) === norm(correctWord)) {
                    revealSpellResult(pNum, true);
                    winRound(pNum, []);
                } else {
                    revealSpellResult(pNum, false);
                    document.getElementById('overlay-msg').innerText = `P${pNum} 오답! ✖`;
                    eliminatePlayer(pNum);
                }
                return;
            }

            const correct = String(q.answer).split(',').map(n => parseInt(n.trim()));
            const user = [...playerSelections[pNum]];
            if(q.type === '순서') {
                if(JSON.stringify(correct) === JSON.stringify(user)) winRound(pNum, user);
                else eliminatePlayer(pNum);
            } else {
                const sortedCorrect = [...correct].sort();
                const sortedUser = [...user].sort();
                if(JSON.stringify(sortedCorrect) === JSON.stringify(sortedUser)) winRound(pNum, user);
                else eliminatePlayer(pNum);
            }
        }

        function winRound(pNum, answerList) {
            isLocked = true;
            setAllSubmitDisabled(true);
            document.getElementById('overlay-msg').innerText = `P${pNum} 정답! ⭕`;
            answerList.forEach(num => {
                const btns = document.querySelectorAll(`#choices-${pNum} .choice-btn`);
                if(btns[num-1]) btns[num-1].classList.add('correct-ans');
            });
            playDingDong();
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }

        function eliminatePlayer(pNum) {
            document.getElementById(`zone-${pNum}`).classList.add('eliminated');
            const btn = document.getElementById(`submit-${pNum}`);
            if(btn) btn.disabled = true;
            playLogout();
            checkSurvival();
        }

        function checkSurvival() {
            const actives = document.querySelectorAll('.player-zone:not(.eliminated)');
            if(actives.length === 1 && !isLocked) {
                isLocked = true;
                setAllSubmitDisabled(true);
                const winnerId = actives[0].id.split('-')[1];
                document.getElementById('overlay-msg').innerText = `P${winnerId} 최후의 승자! 🏆`;
                confetti({ particleCount: 200, spread: 100 });
            } else if(actives.length === 0 && !isLocked) {
                isLocked = true;
                setAllSubmitDisabled(true);
                document.getElementById('overlay-msg').innerText = `모두 탈락! 💀`;
            }
        }

        // --- 관리자 컨트롤러 ---
        function openController() {
            adminWin = window.open("", "Controller", "width=380,height=680");
            adminWin.document.write(`
                <html><head><title>선생님 패널</title>
                <style>
                    body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
                    button { width: 100%; padding: 15px; margin: 8px 0; font-size: 1rem; border-radius: 10px; border: none; cursor: pointer; color: white; }
                    button:disabled { opacity: 0.45; filter: grayscale(0.5); cursor: not-allowed; }
                    .audio { background: #3498db; } .speed { background: #e67e22; } .next { background: #27ae60; } .finish { background: #9b59b6; margin-top: 20px; }
                    #next-preview { text-align: left; background: #fff; border-radius: 12px; padding: 12px; border: 1px solid #ddd; margin-top: 10px; }
                    #next-preview .label { font-size: 0.85rem; color: #555; font-weight: 700; margin-bottom: 6px; }
                    #next-preview .meta { font-size: 0.9rem; color: #222; font-weight: 700; margin-bottom: 6px; }
                    #next-preview .q { font-size: 0.9rem; color: #333; line-height: 1.3; }
                </style>
                </head><body>
                    <h3>👨‍🏫 관리 패널</h3>
                    <div id="q-info" style="font-size:0.9rem; margin-bottom:10px; background:#ddd; padding:5px;"></div>
                    <button id="tts-btn" class="audio" onclick="window.opener.ctrlTTS()">🔊 TTS 듣기</button>
                    <p>TTS 속도: <span id="v_tts">0.80</span></p>
                    <input type="range" id="tts_rate" min="0.5" max="2.0" step="0.1" value="0.8" oninput="document.getElementById('v_tts').innerText=parseFloat(this.value).toFixed(2)">
                    <button id="img-btn" class="speed" onclick="window.opener.ctrlImg()">👀 이미지 보기</button>
                    <p>노출: <span id="v_img">0.50</span></p>
                    <input type="range" id="sd" min="0.05" max="1.0" step="0.05" value="0.5" oninput="document.getElementById('v_img').innerText=parseFloat(this.value).toFixed(2)">
                    <hr>
                    <button id="next-btn" class="next" onclick="window.opener.ctrlNext()">다음 문제 ⏭️</button>
                    <div id="next-preview">
                        <div class="label">다음 문제 미리보기</div>
                        <div class="meta" id="next-meta">-</div>
                        <div class="q" id="next-q">-</div>
                    </div>
                    <button class="finish" onclick="window.opener.ctrlFinish()">최종 게임 종료 🏆</button>
                </body></html>
            `);
            setTimeout(updateControllerUI, 500);
        }

        function updateControllerUI() {
            if(!adminWin) return;
            if(currentIdx >= quizData.length) return;
            const q = quizData[currentIdx];
            adminWin.document.getElementById('q-info').innerText = `[Q${currentIdx+1}] 정답: ${q.answer}`;
            const hasAudioText = q.audio_text !== undefined && q.audio_text !== null && String(q.audio_text).trim() !== "";
            const hasImage = q.image !== undefined && q.image !== null && String(q.image).trim() !== "";
            const hasNextQuestion = currentIdx < quizData.length - 1;
            adminWin.document.getElementById('tts-btn').disabled = !hasAudioText;
            adminWin.document.getElementById('img-btn').disabled = !hasImage;
            adminWin.document.getElementById('next-btn').disabled = !hasNextQuestion;

            const nextMetaEl = adminWin.document.getElementById('next-meta');
            const nextQEl = adminWin.document.getElementById('next-q');
            if(nextMetaEl && nextQEl) {
                if(hasNextQuestion) {
                    const nq = quizData[currentIdx + 1];
                    const nType = (nq && nq.type !== undefined && nq.type !== null && String(nq.type).trim() !== "") ? String(nq.type).trim() : "(유형 없음)";
                    const nQuestion = (nq && nq.question !== undefined && nq.question !== null && String(nq.question).trim() !== "") ? String(nq.question).trim() : "(질문 없음)";
                    nextMetaEl.innerText = `type: ${nType}`;
                    nextQEl.innerText = nQuestion;
                } else {
                    nextMetaEl.innerText = "다음 문제 없음";
                    nextQEl.innerText = "";
                }
            }
        }

        window.ctrlNext = () => {
            if(currentIdx >= quizData.length - 1) return;
            currentIdx++;
            loadQuestion();
        };
        window.ctrlTTS = () => {
            if(currentIdx >= quizData.length) return;
            const txt = quizData[currentIdx].audio_text;
            if(txt === undefined || txt === null || String(txt).trim() === "") return;
            const u = new SpeechSynthesisUtterance(quizData[currentIdx].audio_text);
            u.lang = 'en-US'; u.rate = parseFloat(adminWin.document.getElementById('tts_rate').value);
            speechSynthesis.speak(u);
        };
        window.ctrlImg = () => {
            if(currentIdx >= quizData.length) return;
            const imgSrc = quizData[currentIdx].image;
            if(imgSrc === undefined || imgSrc === null || String(imgSrc).trim() === "") return;
            const img = document.getElementById('q-image');
            img.style.display = 'block';
            const dur = parseFloat(adminWin.document.getElementById('sd').value) * 1000;
            setTimeout(() => { if(quizData[currentIdx].type === '스피드') img.style.display = 'none'; }, dur);
        };
        
        // 최종 종료 버튼 클릭 시
        window.ctrlFinish = () => {
            bgm.pause(); // 배경음악 정지
            bgm.currentTime = 0;
            
            playVictoryWithFadeout(); // 환호성 재생 후 페이드아웃
            
            if(adminWin) adminWin.close(); // 관리패널 닫기

            document.getElementById('game-wrapper').innerHTML = `
                <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background:#000;">
                    <h1 style="font-size:8rem; color:#ffeb3b; animation:pulse 0.5s infinite alternate;">축하합니다!</h1>
                    <p style="font-size:3rem; color:#fff;">오늘의 퀴즈 대결이 종료되었습니다.</p>
                    <button onclick="location.reload()" style="margin-top:50px; padding:20px 50px; font-size:2rem; cursor:pointer;">다시 하기</button>
                </div>`;
            setInterval(() => { confetti(); }, 2000);
        };
    </script>
</body>
</html>
